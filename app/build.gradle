android {
    namespace 'takagi.ru.monica'
    compileSdk 35

    def previewVersionSuffix = project.findProperty('previewVersionSuffix')?.toString()?.trim()
    def appVersionCode = 17
    def baseVersionName = previewVersionSuffix ? "1.0.303-${previewVersionSuffix}" : "1.0.303"
    def normalizeTwoDigits = { raw ->
        def value = raw?.toString()?.trim()?.replaceAll('\\D', '')
        if (!value) {
            return '01'
        }
        value = value.padLeft(2, '0')
        value.length() > 2 ? value[-2..-1] : value
    }

    def sanitizeTag = { raw, fallback ->
        def value = raw?.toString()?.trim()
        if (!value) {
            return fallback
        }
        def cleaned = value.replaceAll('[^0-9A-Za-z._+-]', '_')
        cleaned ?: fallback
    }

    def escapeForBuildConfig = { raw ->
        def value = raw?.toString() ?: ''
        value.replace('\\', '\\\\').replace('"', '\\"')
    }

    def resolveArchTag = { output ->
        def manualArch = project.findProperty('apkArch')
        if (manualArch?.toString()?.trim()) {
            return sanitizeTag(manualArch, 'universal')
        }

        if (output?.metaClass?.respondsTo(output, 'getFilters')) {
            def abiFilter = output.filters?.find {
                def typeText = it?.filterType?.toString()
                typeText?.equalsIgnoreCase('ABI') || typeText?.toUpperCase()?.endsWith('.ABI')
            }
            if (abiFilter?.identifier?.toString()?.trim()) {
                return sanitizeTag(abiFilter.identifier, 'universal')
            }
        }

        def configuredAbis = defaultConfig.ndk?.abiFilters
        if (configuredAbis && !configuredAbis.isEmpty()) {
            return sanitizeTag(configuredAbis.toList().sort().join('+'), 'universal')
        }

        'universal'
    }

    def findNextDailySeqForVersion = { String versionNameTag, String dateTag, String versionTag ->
        def versionPrefix = "${versionNameTag}-${dateTag}${versionTag}"
        def apkNamePattern = java.util.regex.Pattern.compile('^Monica-Steam-Android-.+-' + java.util.regex.Pattern.quote(versionPrefix) + '-(\\d{2})\\.[aA][pP][kK]$')
        def maxSeq = 0

        def outputsDir = file("$buildDir/outputs/apk")
        if (outputsDir.exists()) {
            outputsDir.eachFileRecurse { outputFile ->
                if (!outputFile.isFile()) {
                    return
                }
                def matcher = apkNamePattern.matcher(outputFile.name)
                if (matcher.matches()) {
                    def seq = matcher.group(1).toInteger()
                    if (seq > maxSeq) {
                        maxSeq = seq
                    }
                }
            }
        }

        maxSeq + 1
    }

    def buildDateTag = new Date().format('yyMMdd', java.util.TimeZone.getTimeZone('Asia/Shanghai'))
    def buildVersionTag = normalizeTwoDigits(project.findProperty('apkVersionTag') ?: appVersionCode)
    def manualDailySeq = project.findProperty('dailySeq')
    def buildDailySeq = manualDailySeq != null
            ? normalizeTwoDigits(manualDailySeq)
            : normalizeTwoDigits(findNextDailySeqForVersion(baseVersionName, buildDateTag, buildVersionTag))
    def fullVersionName = "${baseVersionName}-${buildDateTag}${buildVersionTag}-${buildDailySeq}"

    defaultConfig {
        applicationId "takagi.ru.monica.steamapp"
        minSdk 26
        targetSdk 34
        versionCode appVersionCode
        versionName baseVersionName

        // Default resources contain English. Keep only the additional locales
        // exposed by Monica Steam instead of every translation from libraries.
        resourceConfigurations += ['en', 'zh', 'ja', 'ru', 'vi']

        def cfLicenseBaseUrl = project.findProperty('cfLicenseBaseUrl')?.toString()?.trim() ?: 'https://license.609780.xyz'
        def cfLicenseVerifyIntervalSeconds =
                project.findProperty('cfLicenseVerifyIntervalSeconds')?.toString()?.trim() ?: '21600'

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        vectorDrawables {
            useSupportLibrary true
        }

        def gitSha = 'unknown'
        try {
            gitSha = ['git', 'rev-parse', '--short', 'HEAD'].execute([], rootDir).text.trim()
        } catch (ignored) {}
        buildConfigField 'String', 'GIT_SHA', "\"${gitSha}\""
        buildConfigField 'String', 'BUILD_TIME', "\"${new Date().format('yyyy-MM-dd HH:mm:ss z')}\""
        buildConfigField 'String', 'FULL_VERSION_NAME', "\"${fullVersionName}\""
        buildConfigField 'String', 'BUILD_DETAIL_TAG', "\"${buildDateTag}${buildVersionTag}-${buildDailySeq}\""
        buildConfigField 'int', 'BW_DIAG_SCHEMA', '1'
        buildConfigField 'String', 'CF_LICENSE_BASE_URL', "\"${escapeForBuildConfig(cfLicenseBaseUrl)}\""
        buildConfigField 'long', 'CF_LICENSE_VERIFY_INTERVAL_SECONDS', "${cfLicenseVerifyIntervalSeconds}L"
        
    }

    splits {
        abi {
            // 仅输出 ARM 32/64 位两个 APK，不生成 universal 包。
            enable true
            reset()
            include 'arm64-v8a', 'armeabi-v7a'
            universalApk false
        }
    }

    buildTypes {
        release {
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            // Keep locally generated release APKs directly installable. Replace this
            // with a private production keystore before publishing to any store.
            signingConfig signingConfigs.debug
        }
        debug {
            // Delivery builds stay debug-signed for direct installation, but disabling
            // JDWP allows R8 to apply the same code optimizations as release builds.
            debuggable false
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }
    kotlinOptions {
        jvmTarget = '11'
    }
    buildFeatures {
        compose true
        buildConfig true
    }

    applicationVariants.all { variant ->
        variant.outputs.all { output ->
            // 目标格式: Monica-Steam-Android-[架构]-[版本号]-yyMMddVV-SS.APK
            def apkPrefix = 'Monica-Steam'
            def archTag = resolveArchTag(output)
            def versionNameTag = sanitizeTag(project.findProperty('apkVersionName') ?: variant.versionName ?: defaultConfig.versionName, '0.0.0')
            def namePrefix = "${apkPrefix}-Android-${archTag}-${versionNameTag}-${buildDateTag}${buildVersionTag}"
            outputFileName = "${namePrefix}-${buildDailySeq}.APK"
        }
    }

    sourceSets {
        main {
            java {
                exclude 'takagi/ru/monica/MainActivity.kt'
                exclude 'takagi/ru/monica/MonicaApplication.kt'
                exclude 'takagi/ru/monica/ui/SimpleMainScreen.kt'
            }
            kotlin {
                exclude 'takagi/ru/monica/MainActivity.kt'
                exclude 'takagi/ru/monica/MonicaApplication.kt'
                exclude 'takagi/ru/monica/ui/SimpleMainScreen.kt'
            }
        }
    }
    lint {
        baseline = file('lint-baseline.xml')
        // Workaround: lint/lifecycle detector crashes with Kotlin 2.x analysis API in current toolchain.
        disable 'NullSafeMutableLiveData',
                'FrequentlyChangingValue',
                'RememberInComposition',
                'FlowOperatorInvokedInComposition',
                'UnrememberedMutableState',
                'AutoboxingStateCreation',
                'CoroutineCreationDuringComposition',
                'StateFlowValueCalledInComposition',
                'ProduceStateDoesNotAssignValue',
                'MissingTranslation'
        // Avoid scanning dependency-provided lint registries; one of them intermittently
        // crashes ASM migration with NegativeArraySizeException in lintVitalAnalyzeRelease.
        checkDependencies false
        // lintVital still loads dependency registries even when checkDependencies is false.
        // Disable the broken release gate so Android Studio's normal assembleRelease works.
        checkReleaseBuilds false
    }
    packaging {
        resources {
            excludes += '/META-INF/{AL2.0,LGPL2.1}'
            excludes += 'META-INF/versions/9/OSGI-INF/MANIFEST.MF'
            // These data tables support password analysis and Picnic signatures,
            // neither of which is reachable from the standalone Steam experience.
            excludes += 'com/nulabinc/zxcvbn/matchers/dictionaries/**'
            excludes += 'org/bouncycastle/pqc/crypto/picnic/**'
        }
    }
}

